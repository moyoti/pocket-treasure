<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient (Warm Orange + Blue) -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFE0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="226" fill="url(#bgGrad)"/>
  
  <!-- Glow Effect Behind Character -->
  <circle cx="512" cy="400" r="180" fill="url(#glowGrad)" opacity="0.6"/>
  
  <!-- Cute Mascot Character (Explorer Fox) -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <ellipse cx="512" cy="580" rx="140" ry="160" fill="#FF8C00"/>
    
    <!-- Head (larger for kawaii effect) -->
    <circle cx="512" cy="380" r="160" fill="#FFA500"/>
    
    <!-- Ears (fox-like) -->
    <polygon points="420,280 400,220 460,260" fill="#FFA500"/>
    <polygon points="604,280 624,220 564,260" fill="#FFA500"/>
    <polygon points="430,270 415,235 455,260" fill="#FFD700"/>
    <polygon points="594,270 609,235 569,260" fill="#FFD700"/>
    
    <!-- Face -->
    <!-- Eyes (large, expressive) -->
    <ellipse cx="460" cy="370" rx="35" ry="45" fill="white"/>
    <ellipse cx="564" cy="370" rx="35" ry="45" fill="white"/>
    <circle cx="465" cy="375" r="20" fill="#1E3A8A"/>
    <circle cx="569" cy="375" r="20" fill="#1E3A8A"/>
    <circle cx="470" cy="365" r="8" fill="white"/>
    <circle cx="574" cy="365" r="8" fill="white"/>
    
    <!-- Cheeks (kawaii blush) -->
    <circle cx="420" cy="400" r="25" fill="#FF6B6B" opacity="0.6"/>
    <circle cx="604" cy="400" r="25" fill="#FF6B6B" opacity="0.6"/>
    
    <!-- Nose -->
    <circle cx="512" cy="395" r="12" fill="#8B4513"/>
    
    <!-- Smile (excited expression) -->
    <path d="M480 420 Q512 450 544 420" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Explorer Hat -->
    <path d="M380 320 L644 320 L644 300 Q512 260 380 300 Z" fill="#8B4513"/>
    <rect x="360" y="310" width="304" height="30" rx="8" fill="#8B4513"/>
    <rect x="480" y="300" width="64" height="40" fill="#FFD700"/>
    
    <!-- Arms (holding compass) -->
    <path d="M380 540 Q340 580 360 620" stroke="#FFA500" stroke-width="40" fill="none" stroke-linecap="round"/>
    <path d="M644 540 Q684 580 664 620" stroke="#FFA500" stroke-width="40" fill="none" stroke-linecap="round"/>
    
    <!-- Tail (fluffy fox tail) -->
    <path d="M512 720 Q600 780 680 740 Q720 720 700 680 Q660 700 600 720 Q560 730 512 720" fill="#FFA500"/>
    <path d="M540 710 Q580 730 620 720" stroke="#FFD700" stroke-width="20" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Compass (held by character) -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="640" r="70" fill="white" stroke="#FFD700" stroke-width="8"/>
    <circle cx="512" cy="640" r="50" fill="none" stroke="#0066CC" stroke-width="4"/>
    <!-- Compass Needle -->
    <polygon points="512,600 532,640 512,680 492,640" fill="#FF4444"/>
    <polygon points="512,640 522,640 512,670 502,640" fill="white"/>
    <!-- N/S Markers -->
    <text x="512" y="615" font-size="24" font-weight="bold" fill="#FF4444" text-anchor="middle">N</text>
    <text x="512" y="675" font-size="24" font-weight="bold" fill="#0066CC" text-anchor="middle">S</text>
  </g>
  
  <!-- Treasure Chest (slightly open with glow) -->
  <g filter="url(#shadow)">
    <!-- Chest Body -->
    <rect x="380" y="700" width="264" height="180" rx="16" fill="url(#chestGrad)"/>
    <!-- Chest Lid (open) -->
    <path d="M380 700 L380 740 Q512 660 644 740 L644 700 Q512 620 380 700" fill="url(#chestGrad)"/>
    <!-- Golden Light from Chest -->
    <path d="M420 720 L400 660 L440 720 Z" fill="#FFFFE0" opacity="0.8"/>
    <path d="M512 720 L492 640 L532 720 Z" fill="#FFFFE0" opacity="0.8"/>
    <path d="M604 720 L584 660 L624 720 Z" fill="#FFFFE0" opacity="0.8"/>
    <!-- Lock Detail -->
    <circle cx="512" cy="760" r="25" fill="#FFD700"/>
    <rect x="502" y="750" width="20" height="30" rx="4" fill="#8B4513"/>
    <!-- Metallic Bands -->
    <rect x="380" y="740" width="264" height="16" fill="#FFD700" opacity="0.7"/>
    <rect x="380" y="840" width="264" height="16" fill="#FFD700" opacity="0.7"/>
  </g>
  
  <!-- Sparkles & Stars (kawaii effect) -->
  <g fill="white" opacity="0.9">
    <!-- 4-point star -->
    <path d="M280 320 L290 340 L310 320 L300 300 Z"/>
    <circle cx="285" cy="325" r="4" fill="white"/>
    
    <!-- 6-point star -->
    <path d="M744 280 L754 300 L774 280 L764 260 L744 260 L734 280 Z"/>
    
    <!-- Small sparkles -->
    <circle cx="320" cy="760" r="6" fill="white"/>
    <circle cx="700" cy="320" r="5" fill="white"/>
    <circle cx="360" cy="280" r="7" fill="white"/>
    
    <!-- Twinkle lines -->
    <path d="M400 240 L410 260 M405 250 L415 250" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M620 260 L630 280 M625 270 L635 270" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Sakura Petals (Japanese touch) -->
  <g fill="#FFB7C5" opacity="0.8">
    <ellipse cx="200" cy="200" rx="12" ry="8" transform="rotate(30 200 200)"/>
    <ellipse cx="824" cy="180" rx="10" ry="6" transform="rotate(-20 824 180)"/>
    <ellipse cx="180" cy="824" rx="11" ry="7" transform="rotate(45 180 824)"/>
  </g>
</svg>
