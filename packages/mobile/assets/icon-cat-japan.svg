<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Warm orange gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <!-- Golden gradient for treasure chest -->
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFE0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="226" fill="url(#bgGrad)"/>
  
  <!-- Glow behind character -->
  <circle cx="512" cy="380" r="220" fill="url(#glowGrad)" opacity="0.5"/>
  
  <!-- ==================== CUTE CAT MASCOT ==================== -->
  <g filter="url(#shadow)">
    <!-- Cat Body (round, chibi style) -->
    <ellipse cx="512" cy="580" rx="130" ry="150" fill="#FF8C42"/>
    <ellipse cx="512" cy="580" rx="90" ry="110" fill="#FFA560" opacity="0.5"/>
    
    <!-- Cat Head (large for kawaii effect) -->
    <circle cx="512" cy="360" r="170" fill="#FF8C42"/>
    
    <!-- Cat Ears (triangular, cute) -->
    <!-- Left Ear -->
    <path d="M380 280 L350 180 L440 250 Z" fill="#FF8C42"/>
    <path d="M385 275 L365 210 L425 255 Z" fill="#FFB5A7"/>
    
    <!-- Right Ear -->
    <path d="M644 280 L674 180 L584 250 Z" fill="#FF8C42"/>
    <path d="M639 275 L659 210 L599 255 Z" fill="#FFB5A7"/>
    
    <!-- Inner ear detail -->
    <path d="M375 270 L360 210 L420 250 Z" fill="#FFD4C4" opacity="0.8"/>
    <path d="M649 270 L664 210 L604 250 Z" fill="#FFD4C4" opacity="0.8"/>
    
    <!-- Face -->
    <!-- Eyes (large, sparkly, kawaii) -->
    <ellipse cx="450" cy="340" rx="38" ry="48" fill="white"/>
    <ellipse cx="574" cy="340" rx="38" ry="48" fill="white"/>
    
    <!-- Eye pupils (large, blue - matching treasure theme) -->
    <circle cx="455" cy="345" r="26" fill="#0066CC"/>
    <circle cx="579" cy="345" r="26" fill="#0066CC"/>
    
    <!-- Eye highlights (2 per eye for extra sparkle) -->
    <circle cx="445" cy="332" r="10" fill="white"/>
    <circle cx="465" cy="355" r="5" fill="white" opacity="0.7"/>
    <circle cx="569" cy="332" r="10" fill="white"/>
    <circle cx="589" cy="355" r="5" fill="white" opacity="0.7"/>
    
    <!-- Cheeks (pink blush - very kawaii) -->
    <ellipse cx="390" cy="380" rx="30" ry="22" fill="#FF6B9D" opacity="0.7"/>
    <ellipse cx="634" cy="380" rx="30" ry="22" fill="#FF6B9D" opacity="0.7"/>
    
    <!-- Nose (small, pink, triangular) -->
    <path d="M502 375 L512 390 L522 375 Z" fill="#FF6B9D"/>
    
    <!-- Mouth (happy W shape) -->
    <path d="M482 400 Q512 430 542 400" stroke="#8B4513" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M512 390 L512 405" stroke="#8B4513" stroke-width="3" fill="none"/>
    
    <!-- Whiskers (cute, short) -->
    <line x1="380" y1="370" x2="420" y2="375" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <line x1="375" y1="385" x2="415" y2="390" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <line x1="644" y1="370" x2="604" y2="375" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <line x1="649" y1="385" x2="609" y2="390" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Explorer Hat (on top) -->
    <ellipse cx="512" cy="210" rx="120" ry="35" fill="#8B4513"/>
    <path d="M420 210 Q512 140 604 210 L604 180 Q512 110 420 180 Z" fill="#8B4513"/>
    <!-- Hat band -->
    <path d="M430 210 Q512 185 594 210 L594 200 Q512 175 430 200 Z" fill="#FFD700"/>
    <!-- Hat badge (golden compass symbol) -->
    <circle cx="512" cy="195" r="18" fill="#FFD700"/>
    <path d="M512 183 L516 195 L512 207 L508 195 Z" fill="#8B4513"/>
    
    <!-- Paws (holding compass) -->
    <ellipse cx="420" cy="540" rx="35" ry="30" fill="#FF8C42"/>
    <ellipse cx="604" cy="540" rx="35" ry="30" fill="#FF8C42"/>
    <!-- Paw pads -->
    <circle cx="420" cy="545" r="12" fill="#FFB5A7"/>
    <circle cx="604" cy="545" r="12" fill="#FFB5A7"/>
    
    <!-- Cat Tail (curled, fluffy) -->
    <path d="M620 640 Q720 600 720 520 Q720 460 660 480 Q620 495 640 540 Q655 580 620 600" 
          fill="none" stroke="#FF8C42" stroke-width="45" stroke-linecap="round"/>
    <!-- Tail stripes -->
    <path d="M645 610 Q660 595 670 570" fill="none" stroke="#E67E22" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <path d="M665 550 Q685 530 690 500" fill="none" stroke="#E67E22" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- ==================== COMPASS (held by cat) ==================== -->
  <g filter="url(#shadow)">
    <!-- Compass outer ring -->
    <circle cx="512" cy="620" r="80" fill="white" stroke="#FFD700" stroke-width="10"/>
    <!-- Inner ring -->
    <circle cx="512" cy="620" r="60" fill="#E8F4FD" stroke="#0066CC" stroke-width="4"/>
    <!-- Compass directions -->
    <text x="512" y="555" font-family="Arial" font-size="22" font-weight="bold" fill="#FF4444" text-anchor="middle">N</text>
    <text x="512" y="695" font-family="Arial" font-size="22" font-weight="bold" fill="#0066CC" text-anchor="middle">S</text>
    <text x="442" y="628" font-family="Arial" font-size="20" font-weight="bold" fill="#666" text-anchor="middle">W</text>
    <text x="582" y="628" font-family="Arial" font-size="20" font-weight="bold" fill="#666" text-anchor="middle">E</text>
    <!-- Needle (pointing northeast - dynamic) -->
    <polygon points="512,560 540,620 512,680 484,620" fill="#FF4444" opacity="0.8"/>
    <polygon points="512,620 522,620 512,660 502,620" fill="white"/>
    <!-- Center dot -->
    <circle cx="512" cy="620" r="12" fill="#FFD700" stroke="#8B4513" stroke-width="3"/>
  </g>
  
  <!-- ==================== TREASURE CHEST (at bottom) ==================== -->
  <g filter="url(#shadow)">
    <!-- Chest body -->
    <rect x="390" y="720" width="244" height="170" rx="20" fill="url(#chestGrad)"/>
    <!-- Chest lid (open) -->
    <path d="M390 720 L390 750 Q512 680 634 750 L634 720 Q512 650 390 720" fill="url(#chestGrad)"/>
    
    <!-- Treasure glow from inside -->
    <ellipse cx="512" cy="710" rx="80" ry="25" fill="#FFFFE0" opacity="0.9"/>
    <ellipse cx="512" cy="705" rx="60" ry="18" fill="white" opacity="0.8"/>
    
    <!-- Coins/gems peeking out -->
    <circle cx="470" cy="710" r="15" fill="#FFD700"/>
    <circle cx="512" cy="700" r="18" fill="#FFD700"/>
    <circle cx="554" cy="710" r="15" fill="#FFD700"/>
    <circle cx="490" cy="715" r="12" fill="#FF69B4" opacity="0.8"/>
    <circle cx="534" cy="715" r="12" fill="#00CED1" opacity="0.8"/>
    
    <!-- Lock -->
    <circle cx="512" cy="780" r="22" fill="#FFD700" stroke="#8B4513" stroke-width="3"/>
    <rect x="504" y="770" width="16" height="25" rx="4" fill="#8B4513"/>
    
    <!-- Metal bands -->
    <rect x="390" y="750" width="244" height="15" fill="#FFD700" opacity="0.7"/>
    <rect x="390" y="840" width="244" height="15" fill="#FFD700" opacity="0.7"/>
  </g>
  
  <!-- ==================== SPARKLES & EFFECTS ==================== -->
  <!-- Main sparkles -->
  <g fill="white">
    <!-- Large sparkle top left -->
    <path d="M280 280 L285 295 L300 300 L285 305 L280 320 L275 305 L260 300 L275 295 Z" fill="white"/>
    <!-- Large sparkle top right -->
    <path d="M744 260 L749 275 L764 280 L749 285 L744 300 L739 285 L724 280 L739 275 Z" fill="white"/>
    <!-- Medium sparkle bottom left -->
    <path d="M300 760 L304 770 L314 774 L304 778 L300 788 L296 778 L286 774 L296 770 Z" fill="white" opacity="0.9"/>
    <!-- Small sparkles -->
    <circle cx="340" cy="300" r="6" fill="white" opacity="0.8"/>
    <circle cx="700" cy="320" r="8" fill="white" opacity="0.9"/>
    <circle cx="260" cy="400" r="5" fill="white" opacity="0.7"/>
    <circle cx="764" cy="420" r="6" fill="white" opacity="0.8"/>
    <circle cx="320" cy="680" r="7" fill="white" opacity="0.9"/>
  </g>
  
  <!-- ==================== SAKURA PETALS (Japanese touch) ==================== -->
  <g fill="#FFB7C5" opacity="0.7">
    <!-- Petal 1 -->
    <path d="M200 200 Q210 190 220 200 Q230 210 220 220 Q210 230 200 220 Q190 210 200 200" fill="#FFB7C5"/>
    <path d="M200 200 L220 210" stroke="#FF8FA3" stroke-width="2" fill="none"/>
    <!-- Petal 2 -->
    <path d="M824 180 Q834 170 844 180 Q854 190 844 200 Q834 210 824 200 Q814 190 824 180" fill="#FFB7C5"/>
    <path d="M824 180 L844 190" stroke="#FF8FA3" stroke-width="2" fill="none"/>
    <!-- Petal 3 -->
    <path d="M180 824 Q190 814 200 824 Q210 834 200 844 Q190 854 180 844 Q170 834 180 824" fill="#FFB7C5"/>
    <path d="M180 824 L200 834" stroke="#FF8FA3" stroke-width="2" fill="none"/>
    <!-- Petal 4 (small) -->
    <ellipse cx="780" cy="760" rx="15" ry="10" transform="rotate(30 780 760)" fill="#FFB7C5" opacity="0.6"/>
  </g>
  
  <!-- ==================== BORDER ==================== -->
  <rect x="20" y="20" width="984" height="984" rx="206" fill="none" stroke="#FFD700" stroke-width="10" opacity="0.5"/>
</svg>
