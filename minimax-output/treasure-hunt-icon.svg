<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)"/>

  <!-- Subtle Map Grid Pattern -->
  <g opacity="0.15" stroke="#FFFFFF" stroke-width="2" fill="none">
    <circle cx="512" cy="512" r="200"/>
    <circle cx="512" cy="512" r="320"/>
    <circle cx="512" cy="512" r="440"/>
    <line x1="512" y1="72" x2="512" y2="952"/>
    <line x1="72" y1="512" x2="952" y2="512"/>
    <line x1="175" y1="175" x2="849" y2="849"/>
    <line x1="849" y1="175" x2="175" y2="849"/>
  </g>

  <!-- Outer Compass Ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#FFFFFF" stroke-width="12" opacity="0.9"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#D4A017" stroke-width="4" opacity="0.6"/>

  <!-- Compass Points (Cardinal Directions) -->
  <g fill="#FFFFFF" filter="url(#shadow)">
    <!-- North -->
    <polygon points="512,152 492,220 512,200 532,220" stroke="#D4A017" stroke-width="2"/>
    <!-- South -->
    <polygon points="512,872 492,804 512,824 532,804" stroke="#FFFFFF" stroke-width="2"/>
    <!-- East -->
    <polygon points="872,512 804,492 824,512 804,532" stroke="#FFFFFF" stroke-width="2"/>
    <!-- West -->
    <polygon points="152,512 220,492 200,512 220,532" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Compass Needle (pointing Northeast) -->
  <g transform="rotate(-45, 512, 512)" filter="url(#shadow)">
    <!-- Needle base -->
    <ellipse cx="512" cy="512" rx="40" ry="40" fill="url(#goldGradient)"/>
    <!-- North half (golden) -->
    <polygon points="512,280 496,512 528,512" fill="url(#needleGradient)"/>
    <!-- South half (white/silver) -->
    <polygon points="512,744 496,512 528,512" fill="#FFFFFF"/>
    <!-- Center pivot -->
    <circle cx="512" cy="512" r="20" fill="#B8860B" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <!-- Subtle Treasure Chest in Center -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- Chest body -->
    <rect x="-60" y="-40" width="120" height="70" rx="8" fill="url(#goldGradient)"/>
    <!-- Chest lid -->
    <path d="M -60 -40 L -60 -55 Q -60 -70 -45 -70 L 45 -70 Q 60 -70 60 -55 L 60 -40 Z" fill="url(#goldGradient)"/>
    <!-- Chest details -->
    <rect x="-60" y="-45" width="120" height="10" rx="3" fill="#B8860B"/>
    <circle cx="0" cy="10" r="12" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
    <circle cx="0" cy="10" r="5" fill="#B8860B"/>
    <!-- Hinges -->
    <rect x="-55" y="-65" width="15" height="8" rx="2" fill="#B8860B"/>
    <rect x="40" y="-65" width="15" height="8" rx="2" fill="#B8860B"/>
  </g>

  <!-- Decorative Ring with Markings -->
  <g stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5">
    <!-- Hour marks -->
    <g stroke-width="3">
      <line x1="512" y1="140" x2="512" y2="160"/>
      <line x1="512" y1="864" x2="512" y2="884"/>
      <line x1="140" y1="512" x2="160" y2="512"/>
      <line x1="864" y1="512" x2="884" y2="512"/>
    </g>
    <!-- Minute marks (simplified) -->
    <g stroke-width="1.5">
      <line x1="512" y1="132" x2="512" y2="142"/>
      <line x1="512" y1="882" x2="512" y2="892"/>
      <line x1="132" y1="512" x2="142" y2="512"/>
      <line x1="892" y1="512" x2="882" y2="512"/>
    </g>
  </g>

  <!-- Outer Glow Ring -->
  <circle cx="512" cy="512" r="470" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
</svg>
